<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Mycelium icon: central node with radiating hyphae -->
  <circle cx="32" cy="32" r="6" fill="#00FFB2" opacity="0.9"/>
  <circle cx="32" cy="32" r="10" fill="#00FFB2" opacity="0.15"/>
  <!-- Hyphae arms -->
  <line x1="32" y1="26" x2="32" y2="8"  stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="38" x2="32" y2="56" stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="26" y1="32" x2="8"  y2="32" stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="32" x2="56" y2="32" stroke="#00FFB2" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="27" y1="27" x2="14" y2="14" stroke="#00FFB2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="37" y1="37" x2="50" y2="50" stroke="#00FFB2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="37" y1="27" x2="50" y2="14" stroke="#00FFB2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="27" y1="37" x2="14" y2="50" stroke="#00FFB2" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- Spore nodes at tips -->
  <circle cx="32" cy="8"  r="2.5" fill="#00FFB2" opacity="0.8"/>
  <circle cx="32" cy="56" r="2.5" fill="#00FFB2" opacity="0.8"/>
  <circle cx="8"  cy="32" r="2.5" fill="#0EA5E9" opacity="0.8"/>
  <circle cx="56" cy="32" r="2.5" fill="#A78BFA" opacity="0.8"/>
  <circle cx="14" cy="14" r="2"   fill="#0EA5E9" opacity="0.6"/>
  <circle cx="50" cy="50" r="2"   fill="#F59E0B" opacity="0.6"/>
  <circle cx="50" cy="14" r="2"   fill="#A78BFA" opacity="0.6"/>
  <circle cx="14" cy="50" r="2"   fill="#F59E0B" opacity="0.6"/>
</svg>
