# MYCONEX Mesh Configuration
# Default config — override per-node in /etc/myconex/node.yaml

# ─── Node Identity ────────────────────────────────────────────────────────────
node:
  name: ""                    # Auto-detected from hostname if empty
  tier: ""                    # Auto-classified if empty: T1/T2/T3/T4
  roles: []                   # Auto-assigned based on tier if empty
  description: ""

# ─── Mesh Network ─────────────────────────────────────────────────────────────
mesh:
  mdns_service: "_ai-mesh._tcp"
  api_port: 8765
  discovery_timeout: 30       # seconds to wait for initial peer discovery
  heartbeat_interval: 10      # seconds between liveness pulses
  heartbeat_timeout: 30       # seconds before marking a node dead
  max_peers: 256

  # Static peers (optional, for environments without mDNS)
  static_peers: []
  # - name: apex-node
  #   address: 192.168.1.100
  #   port: 8765
  #   tier: T1

# ─── NATS ─────────────────────────────────────────────────────────────────────
nats:
  url: "nats://localhost:4222"
  cluster_urls: []            # Additional cluster nodes
  reconnect_attempts: 10
  reconnect_delay: 2.0
  jetstream: true             # Enable JetStream for persistent messaging

# ─── Redis ────────────────────────────────────────────────────────────────────
redis:
  url: "redis://localhost:6379"
  db: 0
  key_prefix: "myconex:"
  ttl_default: 3600           # 1 hour

# ─── Qdrant (Vector Store) ────────────────────────────────────────────────────
qdrant:
  url: "http://localhost:6333"
  collection: "myconex-knowledge"
  vector_size: 768            # nomic-embed-text dimensions
  distance: "Cosine"

# ─── Ollama ───────────────────────────────────────────────────────────────────
ollama:
  host: "localhost"
  port: 11434
  url: "http://localhost:11434"

  # Models per tier — installer pulls the appropriate one
  # Updated 2026-03-24: aligned with config/lightweight_models.yaml
  tier_models:
    T1: "llama3.1:70b"       # cloud experts preferred; local fallback only
    T2: "qwen3:8b"           # was llama3.1:8b — 119 langs, 128K ctx, Apache 2.0
    T3: "qwen3:4b"           # was llama3.2:3b — better quality, same RAM (4GB)
    T4: "qwen3:0.6b"         # was phi3:mini   — 400MB, runs on anything

  # Always available (loaded on all nodes if resources allow)
  embedding_model: "nomic-embed-text"

  num_parallel: 4
  max_loaded_models: 2
  keep_alive: "5m"

# ─── LiteLLM Proxy ────────────────────────────────────────────────────────────
litellm:
  url: "http://localhost:4000"
  enabled: false              # Enable to route through LiteLLM proxy
  fallback_model: "ollama/phi3:mini"

# ─── MoE-Hermes Integration ───────────────────────────────────────────────────
# Replaces Ollama/llama3.1:8b as the primary LLM backend.
# Sources: integrations/flash-moe + integrations/hermes-agent
hermes_moe:
  enabled: true               # Set false to revert to pure Ollama

  # flash-moe subprocess backend (macOS/Apple Silicon only)
  # Runs Qwen3.5-397B-A17B-4bit locally via Metal compute.
  # Build: cd integrations/flash-moe/metal_infer && make
  flash_moe:
    enabled: true             # Automatically disabled on non-macOS platforms
    binary_path: ""           # Leave empty for auto-detection in integrations/flash-moe/metal_infer/infer
    tokens: 512               # Max tokens to generate per request
    timeout: 120              # Subprocess timeout in seconds

  # Expert pool — tried in order after flash-moe, before Ollama fallback
  # API keys read from environment variables (NOUS_API_KEY, OPENROUTER_API_KEY)
  experts:
    - name: hermes-fast
      model: "NousResearch/Hermes-3-Llama-3.1-8B"
      provider: nous
      base_url: "https://inference-api.nousresearch.com/v1"
      api_key_env: NOUS_API_KEY
      task_types: [chat, ask, summarize, translate]
      min_complexity: 0.0
      max_complexity: 0.45

    - name: hermes-strong
      model: "NousResearch/Hermes-3-Llama-3.1-70B"
      provider: nous
      base_url: "https://inference-api.nousresearch.com/v1"
      api_key_env: NOUS_API_KEY
      task_types: [inference, generate, code, completion, chat, ask, summarize, search, classify]
      min_complexity: 0.45
      max_complexity: 1.0

    - name: openrouter-hermes
      model: "nousresearch/hermes-3-llama-3.1-70b"
      provider: openrouter
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: OPENROUTER_API_KEY
      task_types: [inference, chat, ask, generate, completion, code, summarize, translate, search, classify]
      min_complexity: 0.0
      max_complexity: 1.0

  # Ollama fallback — used when all cloud experts are unavailable.
  # llama3.1:8b is used here because it correctly handles OpenAI-format tool
  # calling (structured tool_calls / tool role messages).  hermes3:8b gets
  # confused by this format because it was trained on Hermes XML <tool_call>
  # tags — use it only via the cloud API path where the server handles format.
  ollama_fallback:
    model: "llama3.1:8b"

  # Default agent parameters
  temperature: 0.7
  max_tokens: 2048
  timeout: 60                 # Per-request timeout in seconds
  max_concurrent: 4           # Concurrent requests per agent

# ─── Task Routing ─────────────────────────────────────────────────────────────
routing:
  default_timeout: 60         # seconds
  max_retries: 3
  retry_delay: 2.0
  queue_max_size: 1000

  # Tier preference for task types (can override per deployment)
  task_tier_map:
    inference:    T1
    chat:         T2
    embedding:    T2
    search:       T3
    classify:     T3
    summarize:    T2
    translate:    T2
    code:         T1
    train:        T1
    sensor:       T4
    relay:        T4

# ─── API ──────────────────────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8765
  workers: 4
  reload: false
  log_level: "info"
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

  # Authentication (disabled by default for mesh-internal comms)
  auth:
    enabled: false
    secret_key: ""            # Set via env: MYCONEX_SECRET_KEY

# ─── Agents ───────────────────────────────────────────────────────────────────
agents:
  # Inference agent
  inference:
    enabled: true
    max_concurrent: 4
    temperature: 0.7
    max_tokens: 2048

  # Embedding agent
  embedding:
    enabled: true
    max_concurrent: 8
    batch_size: 32

  # Code agent (T1 only by default)
  code:
    enabled: true
    max_concurrent: 2
    temperature: 0.2

# ─── Logging ──────────────────────────────────────────────────────────────────
logging:
  level: "INFO"               # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s %(levelname)s [%(name)s] %(message)s"
  file: "/var/log/myconex/myconex.log"
  max_bytes: 10485760         # 10 MB
  backup_count: 5

# ─── Telemetry ────────────────────────────────────────────────────────────────
telemetry:
  enabled: false
  prometheus_port: 9090
  metrics_interval: 15        # seconds

# ─── Discord Bot ──────────────────────────────────────────────────────────────
discord:
  enabled: true               # Bot starts with the node (requires DISCORD_BOT_TOKEN in .env)
  application_id: "1469408384070586432"

  # Access control
  # allowed_users: []         # Uncomment and list Discord user IDs to restrict access
                              # Also settable via DISCORD_ALLOWED_USERS env var

  # Response triggering
  require_mention: false      # true = only respond when @mentioned in server channels
  free_response_channels: []  # Channel IDs that bypass require_mention
  auto_thread: false          # true = auto-create a thread per @mention in text channels

  # Bot interaction
  allow_bots: none            # none | all — whether the bot responds to other bots

# ─── Hermes-Agent Integration ─────────────────────────────────────────────────
hermes:
  enabled: true               # Wire hermes-agent into MYCONEX
  load_tools: true            # Register hermes's 40+ tools into shared registry

  # Model selection (leave blank to use HERMES_MODEL / OPENROUTER_API_KEY env vars)
  model: ""                   # e.g. "anthropic/claude-opus-4-6" or "nous/hermes-3"
  base_url: ""                # e.g. "https://openrouter.ai/api/v1"
  api_key: ""                 # Set via OPENROUTER_API_KEY or ANTHROPIC_API_KEY env var

  # Toolset selection (empty = all available toolsets)
  enabled_toolsets: []        # e.g. ["web", "terminal", "file"]
  disabled_toolsets: []       # e.g. ["browser", "voice"]

  # Agent behaviour
  max_iterations: 90          # Max tool-call iterations per conversation turn
  save_trajectories: false    # Save full conversation trajectories to ~/.hermes/
  skip_memory: false          # Skip Honcho memory (set true if Honcho not configured)
  idle_ttl_s: 1800            # Evict idle hermes sessions after 30 min

  # Multi-platform gateway (optional)
  # Set gateway_config_path to a hermes gateway.yaml to enable Telegram, Slack, etc.
  gateway_config_path: ""     # e.g. "~/.hermes/gateway.yaml"

# ─── MCP (Model Context Protocol) Servers ─────────────────────────────────────
mcp:
  enabled: false              # Set true and add servers below to enable MCP

  # Example MCP servers (uncomment and configure as needed):
  servers: []
