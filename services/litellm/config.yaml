# LiteLLM Proxy Config for MYCONEX
# Routes model calls to Ollama or cloud providers

model_list:
  # ─── Ollama Local Models ────────────────────────────────────────────────────
  - model_name: llama3.1-70b
    litellm_params:
      model: ollama/llama3.1:70b
      api_base: http://ollama:11434

  - model_name: llama3.1-8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434

  - model_name: llama3.2-3b
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434

  - model_name: phi3-mini
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://ollama:11434

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

  # ─── Default / Fallback ─────────────────────────────────────────────────────
  - model_name: default
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://ollama:11434

litellm_settings:
  set_verbose: false
  json_logs: false
  request_timeout: 120
  num_retries: 2
  allowed_fails: 3

router_settings:
  redis_host: redis
  redis_port: 6379
  redis_password: ""
  routing_strategy: "least-busy"
  model_group_alias:
    chat: ["llama3.1-8b", "llama3.2-3b", "phi3-mini"]
    inference: ["llama3.1-70b", "llama3.1-8b"]
    embedding: ["nomic-embed-text"]

general_settings:
  master_key: ""              # Set via env LITELLM_MASTER_KEY for auth
  database_url: "sqlite:////app/data/litellm.db"
