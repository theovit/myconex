name: myconex-hub

# MYCONEX Service Stack
# Core infrastructure: NATS, Redis, Qdrant, Ollama, LiteLLM

networks:
  myconex:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  redis_data:
  qdrant_data:
  ollama_data:
  nats_data:
  litellm_data:
  postgres_data:

services:

  # ─── NATS (Message Bus) ──────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: myconex-nats
    restart: unless-stopped
    command: >
      -c /etc/nats/nats.conf
      --cluster_name myconex-cluster
      --js
      --sd /data
    ports:
      - "4222:4222"   # Client connections
      - "6222:6222"   # Cluster routing
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats_data:/data
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
    networks:
      myconex:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.myconex.service: "nats"
      com.myconex.role: "messaging"

  # ─── Redis (Cache + State) ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myconex-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      myconex:
        ipv4_address: 172.30.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.myconex.service: "redis"
      com.myconex.role: "cache"

  # ─── Qdrant (Vector DB) ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: myconex-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant/config.yaml:/qdrant/config/production.yaml:ro
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    networks:
      myconex:
        ipv4_address: 172.30.0.12
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/6333"]
      interval: 15s
      timeout: 10s
      retries: 5
    labels:
      com.myconex.service: "qdrant"
      com.myconex.role: "vector-store"

  # ─── Ollama (Local LLM Runtime) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: myconex-ollama
    restart: unless-stopped
    entrypoint: ["/entrypoint.sh"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
      # Override to pin a specific model; leave unset for auto-detection
      # - OLLAMA_MODEL=llama3.1:8b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      myconex:
        ipv4_address: 172.30.0.13
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    labels:
      com.myconex.service: "ollama"
      com.myconex.role: "inference"

  # ─── PostgreSQL (LiteLLM backend DB) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myconex-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm
      - POSTGRES_DB=litellm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      myconex:
        ipv4_address: 172.30.0.15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.myconex.service: "postgres"
      com.myconex.role: "litellm-db"
    profiles:
      - full

  # ─── LiteLLM (LLM Proxy / Router) ────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: myconex-litellm
    restart: unless-stopped
    command: --config /app/config.yaml --port 4000 --num_workers 4
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_LOG=INFO
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://litellm:litellm@postgres:5432/litellm
    depends_on:
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      myconex:
        ipv4_address: 172.30.0.14
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.myconex.service: "litellm"
      com.myconex.role: "llm-proxy"
    profiles:
      - full   # Requires PostgreSQL. Start with: docker compose --profile full up

  # ─── MYCONEX API Gateway ──────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: services/Dockerfile
    container_name: myconex-api
    restart: unless-stopped
    command: ["--mode", "api", "--host", "0.0.0.0", "--port", "8765"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "8765:8765"
    volumes:
      - ../config:/etc/myconex:ro
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - LITELLM_URL=http://litellm:4000
      - MYCONEX_CONFIG=/etc/myconex/mesh_config.yaml
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      litellm:
        condition: service_healthy
    networks:
      myconex:
        ipv4_address: 172.30.0.20
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    labels:
      com.myconex.service: "api"
      com.myconex.role: "gateway"
    profiles:
      - full   # Only start with: docker compose --profile full up

  # ─── MYCONEX Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: services/Dockerfile.dashboard
    container_name: myconex-dashboard
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - ../config:/etc/myconex:ro
      - ${HOME}/.myconex:/root/.myconex              # host data files (ingesters, profiles, logs)
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_BASE_URL=http://ollama:11434
      - LITELLM_URL=http://litellm:4000
      - MYCONEX_CONFIG=/etc/myconex/mesh_config.yaml
    depends_on:
      api:
        condition: service_healthy
    networks:
      myconex:
        ipv4_address: 172.30.0.21
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/status"]
      interval: 15s
      timeout: 10s
      retries: 5
    labels:
      com.myconex.service: "dashboard"
      com.myconex.role: "ui"
    profiles:
      - full
