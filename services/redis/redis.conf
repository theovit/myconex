# MYCONEX Redis Configuration
# Optimized for distributed AI mesh caching and ephemeral state management

# Network
bind 127.0.0.1 ::1
port 6379
timeout 300
tcp-keepalive 300

# General
daemonize no
supervised systemd
loglevel notice
logfile /var/log/redis/redis.log
syslog-enabled yes
syslog-ident redis-myconex

# Snapshots
save 900 1
save 300 10
save 60 10000

# Security
# requirepass yourpasswordhere  # Set via environment variable
protected-mode yes

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Append only file
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command SHUTDOWN SHUTDOWN_MYCONEX
rename-command CONFIG CONFIG_MYCONEX

# Performance tuning
tcp-backlog 511
databases 16

# Disable unused features for security
# disable-thp yes

# Clustering (disabled for single node)
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000

# Sentinel (disabled)
# sentinel monitor mymaster 127.0.0.1 6379 2
# sentinel down-after-milliseconds mymaster 5000
# sentinel failover-timeout mymaster 10000